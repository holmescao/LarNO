default: &DEFAULT

  # ─────────────────────────────────────────────────────────────────────────────
  # Config: urbanflood_config_2d.yaml  (QUICK TEST — region1 inference)
  #
  # Use case: run inference on the Futian (region1_20m) test set using the
  #           pre-trained Futian weights. No training needed.
  #
  # The pre-trained weight path is already embedded — just run:
  #   python test.py --config urbanflood_config_2d.yaml --expr_id <expr_id>
  #
  # Key settings:
  #   - Architecture MUST match pretrained: n_modes=100x140, hidden_ch=32, n_layers=4
  #   - finetune.enabled=True (used to load pretrained weights during test)
  #   - data: region1_20m, region1_fulltrain.txt / region1_test.txt
  #   - eval.locations: region1_20m
  # ─────────────────────────────────────────────────────────────────────────────

  #General
  n_params_baseline: None
  verbose: True
  arch: 'tfno2d'

  # Distributed computing
  # Single-GPU (default): use_distributed: False, run with: python run_train.py
  # Multi-GPU (DDP):      use_distributed: True,  run with: torchrun --nproc_per_node=N train.py
  #   -> set batch_size = N (one sample per GPU)
  distributed:
    use_distributed: False
    wireup_info: 'mpi'
    wireup_store: 'tcp'
    model_parallel_size: 2
    seed: 666

  # FNO model architecture
  tfno2d:
    data_channels: 13       # 6 rainfall + 6 cumulative-rainfall + 1 DEM (see README)
    n_modes_height: 100     # spatial frequency modes - height direction
    n_modes_width: 140      # spatial frequency modes - width direction
    hidden_channels: 32     # internal feature dimension (must match pretrained)
    projection_channel_ratio: 2
    n_layers: 4
    domain_padding: None
    domain_padding_mode: 'one-sided'
    fft_norm: 'forward'
    norm: 'group_norm'
    skip: 'linear'
    implementation: 'factorized'
    separable: 0
    preactivation: 0
    use_channel_mlp: 1
    channel_mlp_expansion: 0.5
    channel_mlp_dropout: 0
    factorization: None
    rank: 1.0
    fixed_rank_modes: None
    dropout: 0.0
    tensor_lasso_penalty: 0.0
    joint_factorization: False
    stabilizer: None
    finetune_lifting_only: True
    wall_height: 50  # DEM value assigned to buildings/borders - must exceed real terrain max (metres)

  # Pre-trained model (region1_20m)
  finetune:
    enabled: True
    pretrained_dir: "../../exp/20260220_183648_006352/weights/model_epoch_992_error@0.000055821"
    state_dict_name: "model_epoch_992_error@0.000055821_state_dict.pt"

  # Optimizer and scheduler
  opt:
    n_epochs: 100
    learning_rate: 1e-2
    training_loss: 'WMSE'  # 'l2' | 'h1' | 'WMSE' | 'h1WMSE'
    weight_decay: 1e-4
    amp_autocast: False
    scheduler_T_max: 500
    scheduler_patience: 5
    scheduler: 'WarmUpCosineAnneal'  # 'CosineAnnealingLR' | 'ReduceLROnPlateau' | 'WarmUpCosineAnneal'
    step_size: 60
    gamma: 0.5
    warm_up_iter: 1
    T_max: 100
    lr_max: 1e-2
    lr_min: 1e-4
    window_size: 8  # number of time steps predicted per forward pass

  # Dataset
  data:
    batch_size: 1           # set to N when using N-GPU DDP
    n_train: 1
    train_resolution: 400*560
    n_test: 1
    test_resolutions: 400*560
    test_batch_sizes: 1
    encode_input: True
    encode_output: False
    num_workers_train: 0    # keep 0 on Windows; increase on Linux for speed
    num_workers_test: 0
    train_list: "region1_fulltrain.txt"
    test_list: "region1_test.txt"
    data_root: "../../benchmark/urbanflood/"
    exp_root: "../../exp"
    train_location: "region1_20m"

  # Evaluation
  eval:
    flood_threshold: 0.03  # water depth (metres) above which a cell is counted as "flooded" (CSI)
    locations: "region1_20m"  # comma-separated list of locations to evaluate

  # Patching (disabled)
  patching:
    levels: 0
    padding: 0
    stitching: False
